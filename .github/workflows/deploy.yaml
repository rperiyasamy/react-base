          # aws s3 cp "./${{ env.BUILD_TARGET }}/${{ env.LATEST_ZIP_BASENAME }}" "s3://${{ vars.ARTIFACTS_BUCKET }}/lambda-builds/${{ env.BUILD_TARGET }}/${{ env.LATEST_ZIP_BASENAME }}"
          # ls ./${{ env.BUILD_TARGET }}/

