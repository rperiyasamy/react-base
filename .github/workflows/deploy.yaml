      #   run: |
      #     pwd
      #     ls -ltrh ./root/layers/${{ github.event.inputs.layer }}
      #     cp -r ./root/layers/${{ github.event.inputs.layer }}/ tg-infrastructure/live/${{ matrix.env }}/operation/lambda_layer/${{ github.event.inputs.layer }}/
      #     ls -ltrh tg-infrastructure/live/${{ matrix.env }}/operation/lambda_layer/${{ github.event.inputs.layer }}/
            
      - name: Run Terragrunt for Layers
        if: ${{ matrix.item.type == 'layer' }}
        uses: gruntwork-io/terragrunt-action@v2
        env:
          EC_API_KEY: ${{ secrets.EC_API_KEY }}
          INPUT_PRE_EXEC_0: |
            git config --global url."https://oauth2:${{ secrets.GH_TOKEN }}@github.com".insteadOf ssh://git@github.com
            sudo apt update -y && sudo apt install -y python3
            echo "ECKEY: $EC_API_KEY"
        with:
          tf_version: 1.9.8
          tg_version:  0.59.3
          tg_dir: tg-infrastructure/live/${{ matrix.env }}/operation/lambda_layer/${{ github.event.inputs.layer }}
          tg_command: 'run-all apply --terragrunt-non-interactive'

      - name: Run Terragrunt
        if: ${{ matrix.item.type != 'lambda' }}
        uses: gruntwork-io/terragrunt-action@v2
        env:
          EC_API_KEY: ${{ secrets.EC_API_KEY }}
          INPUT_PRE_EXEC_0: |
            git config --global url."https://oauth2:${{ secrets.GH_TOKEN }}@github.com".insteadOf ssh://git@github.com
            sudo apt update -y && sudo apt install -y python3
            echo "ECKEY: $EC_API_KEY"
        with:
          tf_version: 1.9.8
          tg_version:  0.59.3
          tg_dir: tg-infrastructure/live/${{ matrix.env }}/operation/lambdas/${{ github.event.inputs.lambda }}
          tg_command: 'run-all apply --terragrunt-non-interactive'

