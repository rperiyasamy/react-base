name: Build and deploy API-Automation lambdas

on:
  push:
    branches:
      - 'dev'
#     - 'main'

  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        default: 'dev'
        options:
          - prod
          - dev
          - nqa
      lambda:
        type: choice
        description: 'Lambda function (Select only if deploying a Lambda function)'
        required: false
        default: 'None'
        options:
          - None
          - patient-create-automation
          - patient-documents-reports
          - hl7parser-automation
          - patient-documentation-automation
          - patient-search
          - patient-insurance-automation
          - patient-upload-document
          - patient-claim-automation
          - patient-multiple-automation

      layer:
        type: choice
        description: 'Lambda Layer (Select only if deploying a Layer)'
        required: false
        default: 'None'
        options:
          - None
          - config_and_error_layer
          - powertool-layer
          - request_oauth_layer

env:
  SERVICE: lambdas
  
permissions:
  contents: read
  id-token: write
  issues: write
  
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate image tag
        run: |
          echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Set Matrix
        id: set-matrix
        run: |
          {
           # deploy from dev branch to dev
          if [[ ${GITHUB_REF} == 'refs/heads/dev' && ${{ github.event_name }} != 'workflow_dispatch' ]]; then
            echo "matrix<<EOF"
            echo "{\"include\":[{\"env\":\"ndev\",\"image\":\"${{env.SHA}}-dev\",\"build\":true}]}"
          elif [[ ${GITHUB_REF} == 'refs/heads/prod' && ${{ github.event_name }} != 'workflow_dispatch' ]]; then
            echo "matrix<<EOF"
            echo "{\"include\":[{\"env\":\"dev\",\"image\":\"${{env.SHA}}-prod\",\"build\":true}]}"
          elif [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            echo "matrix<<EOF"
            echo "{\"include\":["
              if [[ "${{ github.event.inputs.environment }}" == 'dev' ]]; then
                echo "{\"env\":\"ndev\",\"image\":\"${{env.SHA}}-dev\",\"build\":true},"
              elif [[ "${{ github.event.inputs.environment }}" == 'prod' ]]; then
                echo "{\"env\":\"dev\",\"image\":\"${{env.SHA}}-prod\",\"build\":false},"
              elif [[ "${{ github.event.inputs.environment }}" == 'nqa' ]]; then
                echo "{\"env\":\"nqa\",\"image\":\"${{env.SHA}}-nqa\",\"build\":false},"
              else
                echo "{\"env\":\"${environment}\",\"image\":\"latest\"},"
              fi
            echo "]}"
          else
            echo "matrix<<EOF"
            echo ""
          fi
          echo EOF
          } >> $GITHUB_OUTPUT
      - name: Echo Matrix
        run: |
          echo "${{ steps.set-matrix.outputs.matrix }}"

  find-modified-lambdas:
    needs: prepare
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      # lambdas: ${{ steps.changed.outputs.lambdas }}
      # layers: ${{ steps.changed.outputs.layers }}
      items: ${{ steps.changed.outputs.items }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=origin/${{ github.base_ref }}
          else
            BASE=HEAD~1
          fi

          # Get unique first-level folder names from lambda_functions
          LAMBDAS=$(git diff --name-only $BASE HEAD \
            | grep '^root/lambda_functions/' \
            | cut -d/ -f3 \
            | sort -u)

          # Get unique first-level folder names from layers
          LAYERS=$(git diff --name-only $BASE HEAD \
            | grep '^root/layers/' \
            | cut -d/ -f3 \
            | sort -u)

          # # Convert to JSON arrays, set to None if empty
          # if [ -z "$LAMBDAS" ]; then
          #   LAMBDAS_JSON="None"
          # else
          #   LAMBDAS_JSON=$(printf '%s\n' $LAMBDAS | jq -R -s -c 'split("\n")[:-1]')
          # fi

          # if [ -z "$LAYERS" ]; then
          #   LAYERS_JSON="None"
          # else
          #   LAYERS_JSON=$(printf '%s\n' $LAYERS | jq -R -s -c 'split("\n")[:-1]')
          # fi

          # echo "Detected lambdas JSON: $LAMBDAS_JSON"
          # echo "Detected layers JSON: $LAYERS_JSON"
          # echo "lambdas=$LAMBDAS_JSON" >> $GITHUB_OUTPUT
          # echo "layers=$LAYERS_JSON" >> $GITHUB_OUTPUT

          ITEMS=()

          # Build lambda items
          if [ -n "$LAMBDAS" ]; then
            while read -r lambda; do
              ITEMS+=("{\"type\":\"lambda\",\"name\":\"$lambda\"}")
            done <<< "$LAMBDAS"
          fi

          # Build layer items
          if [ -n "$LAYERS" ]; then
            while read -r layer; do
              ITEMS+=("{\"type\":\"layer\",\"name\":\"$layer\"}")
            done <<< "$LAYERS"
          fi

          # If nothing changed, output empty array
          if [ ${#ITEMS[@]} -eq 0 ]; then
            ITEMS_JSON="[]"
          else
            ITEMS_JSON=$(printf '[%s]' "$(IFS=,; echo "${ITEMS[*]}")")
          fi

          echo "Detected build items: $ITEMS_JSON"
          echo "items=$ITEMS_JSON" >> "$GITHUB_OUTPUT"

  approval:
    needs: [prepare]
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.matrix != '' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    environment: ${{ matrix.env }} 
    steps:
      - name: approve-prod-deployment
        if: ${{ matrix.env == 'prod' }}
        uses: trstringer/manual-approval@v1
        timeout-minutes: 30
        with:
          secret: ${{ github.TOKEN }}
          approvers: rperiyasamy
          minimum-approvals: 1
          issue-title: "Deploying c1-providerservice to ${{ matrix.env }}"

      - name: Approval Received
        if: ${{ matrix.env == 'prod' }}
        run: echo "Approval for deploying c1-providerservice to ${{ matrix.env }} was received"

  resolve-build-items:
    needs:
      - prepare
      - approval
      - find-modified-lambdas
    runs-on: ubuntu-latest
    if: always() && needs.prepare.outputs.matrix != ''
    outputs:
      items: ${{ steps.set-items.outputs.items }}
    steps:
      - id: set-items
        run: |
          echo "Resolving build items…"

          ITEMS='[]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.layer }}" != "None" ]]; then
              ITEMS='[{"type":"layer","name":"${{ github.event.inputs.layer }}"}]'
            elif [[ "${{ github.event.inputs.lambda }}" != "None" ]]; then
              ITEMS='[{"type":"lambda","name":"${{ github.event.inputs.lambda }}"}]'
            fi
          else
            RAW_ITEMS='${{ needs.find-modified-lambdas.outputs.items }}'

            # Use jq to reorder: layers first, lambdas second
            ITEMS=$(echo "$RAW_ITEMS" | jq -c '
              (map(select(.type=="layer")) + map(select(.type=="lambda")))
            ')
          fi

          echo "Resolved items (ordered): $ITEMS"
          echo "items=$ITEMS" >> "$GITHUB_OUTPUT"


  build:
    needs:
      - prepare
      - resolve-build-items
      # - approval
    if: ${{ needs.prepare.outputs.matrix != '' && needs.resolve-build-items.outputs.items != '[]' }}
    strategy:
      # matrix:
      #   # lambda: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.lambda != 'None' && fromJSON(format('[{0}]', toJSON(github.event.inputs.lambda))) || (needs.find-modified-lambdas.outputs.lambdas == 'None' && fromJSON('["None"]') || fromJSON(needs.find-modified-lambdas.outputs.lambdas)) }}
      #   # layer: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.layer != 'None' && fromJSON(format('[{0}]', toJSON(github.event.inputs.layer))) || (needs.find-modified-lambdas.outputs.layers == 'None' && fromJSON('["None"]') || fromJSON(needs.find-modified-lambdas.outputs.layers)) }}
      #   item: ${{ fromJSON(needs.find-modified-lambdas.outputs.items || '[]') }}
      matrix:
        # item: ${{ 
        #     github.event_name == 'workflow_dispatch' &&
        #       (
        #         github.event.inputs.lambda != 'None' &&
        #         fromJSON('[{"type":"lambda","name":"' + github.event.inputs.lambda + '"}]') ||
        #         github.event.inputs.layer != 'None' &&
        #         fromJSON('[{"type":"layer","name":"' + github.event.inputs.layer + '"}]')
        #       )
        #     ||
        #     fromJSON(needs.find-modified-lambdas.outputs.items)
        #   }}
        item: ${{ fromJSON(needs.resolve-build-items.outputs.items) }}
      max-parallel: 1
      fail-fast: false
    runs-on: ubuntu-latest
    outputs:
      BUILD_PATH: ${{ steps.set-path.outputs.BUILD_PATH }}
      BUILD_TARGET: ${{ steps.set-path.outputs.BUILD_TARGET }}
    environment: ${{ needs.prepare.outputs.matrix != '' && fromJSON(needs.prepare.outputs.matrix)[0].env || 'ndev' }}
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.matrix != '' && fromJSON(needs.prepare.outputs.matrix)[0].image || 'latest' }}
      APP_ENV: ${{ needs.prepare.outputs.matrix != '' && fromJSON(needs.prepare.outputs.matrix)[0].env || 'ndev' }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Configure AWS Credentials
      #   id: aws-credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT }}:role/github-actions-${{ matrix.env }}
      #     role-duration-seconds: 3600
      #     output-credentials: true
