        run: |
          echo "Build item type: ${{ matrix.item.type }}"
          echo "Build item name: ${{ matrix.item.name }}"

          if [[ "${{ matrix.item.type }}" == "lambda" ]]; then
            BUILD_PATH="root/lambda_functions/${{ matrix.item.name }}"
            BUILD_TARGET="${{ matrix.item.name }}"
          elif [[ "${{ matrix.item.type }}" == "layer" ]]; then
            BUILD_PATH="root/layers/${{ matrix.item.name }}"
            BUILD_TARGET="${{ matrix.item.name }}"
          else
            echo "Error: Unknown build item type"
            exit 1
