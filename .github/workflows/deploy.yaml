      - name: Get latest dev build zip from nDEV S3 
        if: ${{ matrix.env != 'ndev' }}
        run: |
          LATEST_ZIP=$(aws s3 ls s3://${{ vars.REGISTRY_ARTIFACTS_BUCKET }}/lambda-builds/${{ env.BUILD_TARGET }}/ --recursive | grep "${{ env.BUILD_TARGET }}-.*\.zip" | sort | tail -n 1 | awk '{print $4}')
          
          if [ -z "$LATEST_ZIP" ]; then
            echo "Error: No dev build found in S3."
            exit 1
          fi
          
          mkdir ${{ env.BUILD_TARGET }}
