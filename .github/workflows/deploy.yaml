          ls -ltrh ./${{ env.BUILD_TARGET }}/
          ls -ltrh ./tg-infrastructure/live/${{ matrix.env }}/operation/lambdas/${{ github.event.inputs.lambda }}

      # - name: Copy zip files for layer other than config and error layer
